const SPAIN_VOICES = ["conchita", "monica", "lucia", "jorge", "juan", "elena", "carlos", "maria"];
const Speech = {
  synth: typeof window !== "undefined" ? window.speechSynthesis : null,
  _voice: null,
  pickVoice() {
    if (!this.synth) return;
    const all = this.synth.getVoices();
    const esES = all.filter(v => v.lang === "es-ES");
    for (const name of SPAIN_VOICES) {
      const v = esES.find(v => v.name.toLowerCase().includes(name));
      if (v) {
        this._voice = v;
        return;
      }
    }
    const branded = esES.find(v => /google|microsoft/i.test(v.name));
    if (branded) {
      this._voice = branded;
      return;
    }
    if (esES.length) {
      this._voice = esES[0];
      return;
    }
    const anyEs = all.find(v => v.lang.startsWith("es"));
    if (anyEs) {
      this._voice = anyEs;
      return;
    }
    this._voice = all[0] || null;
  },
  getVoice() {
    if (!this._voice) this.pickVoice();
    return this._voice;
  },
  speak(text, {
    rate = 0.9,
    pitch = 1.18,
    volume = 1,
    onEnd,
    jitter = true
  } = {}) {
    if (!this.synth) return;
    this.synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = "es-ES";
    utt.volume = volume;
    utt.rate = jitter ? rate + (Math.random() * 0.06 - 0.03) : rate;
    utt.pitch = jitter ? pitch + (Math.random() * 0.10 - 0.05) : pitch;
    const v = this.getVoice();
    if (v) utt.voice = v;
    utt.onend = () => onEnd?.();
    this.synth.speak(utt);
  },
  cheer(text, opts) {
    this.speak(text, {
      rate: 1.05,
      pitch: 1.38,
      jitter: true,
      ...(opts || {})
    });
  },
  correct(text, opts) {
    this.speak(text, {
      rate: 0.82,
      pitch: 1.05,
      jitter: false,
      ...(opts || {})
    });
  },
  stop() {
    this.synth?.cancel();
  }
};
function useTTS() {
  const speak = useCallback((t, o) => Speech.speak(t, o || {}), []);
  const cheer = useCallback((t, o) => Speech.cheer(t, o || {}), []);
  const correct = useCallback((t, o) => Speech.correct(t, o || {}), []);
  const stop = useCallback(() => Speech.stop(), []);
  return {
    speak,
    cheer,
    correct,
    stop
  };
}
